name: Build iOS unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-ios-unsigned.yml"
      - "flutter_app/**"

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Precache iOS artifacts
        run: flutter precache --ios

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Remove CocoaPods integration for SPM iOS plugins
        working-directory: flutter_app
        run: |
          rm -f ios/Podfile ios/Podfile.lock
          rm -rf ios/Pods ios/.symlinks

      - name: Build iOS app without codesign
        working-directory: flutter_app
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        working-directory: flutter_app
        run: |
          rm -rf Payload SportZone-unsigned.ipa
          test -d build/ios/iphoneos/Runner.app
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app Payload/Runner.app
          ditto -c -k --sequesterRsrc --keepParent Payload SportZone-unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: SportZone-unsigned-ipa
          path: flutter_app/SportZone-unsigned.ipa
          if-no-files-found: error
          retention-days: 7
